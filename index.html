<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dual Login / Signup Form</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
        
    <!-- PASTE THE GOOGLE VERIFICATION TAG RIGHT HERE -->
    <meta name="google-site-verification" content="uQlcQ8uKovuu6QA0x1KDseMrXJdltlHfJGcKNH2HCo8" />

    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.2/css/bootstrap.min.css'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css'>
    <<link rel="stylesheet" href="frontend/styles.css" />
</head>
<body>
    <section>
        <div class="container" id="container">
            
            <!-- SIGN UP SECTION -->
            <div class="form-container sign-up-container">
                <form id="signupForm" action="#">
                    <h1>Sign Up</h1>
                    <div class="social-container">
                        <a href="#" class="social"><i class="fab fa-github"></i></a>
                        <a href="#" class="social"><i class="fab fa-codepen"></i></a>
                        <a href="#" class="social"><i class="fab fa-google"></i></a>
                    </div>
                    <span>Or use your Email for registration</span>
                    <label>
                        <input type="text" id="signupName" placeholder="Name" required />
                    </label>
                    <label>
                        <input type="email" id="signupEmail" placeholder="Email" required />
                    </label>
                    <label>
                        <input type="password" id="signupPassword" placeholder="Password" required />
                    </label>
                    <button type="submit" style="margin-top: 9px">Sign Up</button>
                </form>
            </div>

            <!-- SIGN IN SECTION -->
            <div class="form-container sign-in-container">
                <form id="loginForm" action="#">
                    <h1>Sign in</h1>
                    <div class="social-container">
                        <a href="#" class="social"><i class="fab fa-github"></i></a>
                        <a href="#" class="social"><i class="fab fa-codepen"></i></a>
                        <a href="#" class="social"><i class="fab fa-google"></i></a>
                    </div>
                    <span> Or sign in using E-Mail Address</span>
                    <label>
                        <input type="email" id="loginEmail" placeholder="Email" required />
                    </label>
                    <label>
                        <input type="password" id="loginPassword" placeholder="Password" required />
                    </label>
                    <a href="#">Forgot your password?</a>
                    <button type="submit">Sign In</button>
                </form>
            </div>

            <!-- OVERLAY SECTION (Animation logic) -->
            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-left">
                        <h1>Log in</h1>
                        <p>Sign in here if you already have an account</p>
                        <button class="ghost mt-5" id="signIn">Sign In</button>
                    </div>
                    <div class="overlay-panel overlay-right">
                        <h1>Create Account!</h1>
                        <p>Sign up if you still don't have an account ...</p>
                        <button class="ghost" id="signUp">Sign Up</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/js/bootstrap.min.js'></script>
    <script src="frontend/script.js"></script>
</body>
</html>
